<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Micro Pokémon-style Dialog</title>
  <link rel="stylesheet" href="style.css" />
  <!-- 픽셀 폰트 느낌: 시스템 폰트로도 가능하지만, 감성은 폰트가 큼 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
  <main class="frame" aria-label="game screen">
    <section class="screen">
      <div class="scene">
        <div class="title">PROJECT MON</div>
        <div class="hint">A: Next · B: Back · ⌨ Enter/Space 가능</div>
      </div>

      <div class="dialog" role="dialog" aria-live="polite">
        <div class="dialog-inner">
          <div class="name" id="name"></div>
          <div class="text" id="text"></div>

          <div class="choices" id="choices" hidden></div>

          <div class="footer">
            <div class="controls">
              <button id="btnB" class="btn secondary">B</button>
              <button id="btnA" class="btn primary">A</button>
            </div>
            <div class="cursor" id="cursor" aria-hidden="true">▶</div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
