<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pocket Dialog</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="screen">
    <div class="scene">
      <div class="scene-title">KIA DEALERSHIP QUEST</div>
      <div class="scene-sub">A/B/C로 선택하세요</div>
    </div>

    <div class="dialog">
      <div id="name"></div>
      <div id="text"></div>

      <div class="buttons">
        <button id="btnA" type="button">A</button>
        <button id="btnB" type="button">B</button>
        <button id="btnC" type="button">C</button>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
